<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>I'm Sorry</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #fce3ec, #e3f2fd);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: #ffffff;
        padding: 45px 35px;
        border-radius: 18px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
        max-width: 420px;
        text-align: center;
        animation: fadeIn 1.5s ease;
      }

      h1 {
        color: #ff4d79;
        margin-bottom: 15px;
        font-size: 28px;
      }

      .heart {
        font-size: 50px;
        animation: pulse 1.2s infinite;
        margin: 15px 0;
      }

      p {
        color: #555;
        font-size: 16px;
        line-height: 1.6;
        margin-top: 10px;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>I'm Really Sorry</h1>

      <div class="heart">❤️</div>

<p> Please forgive me.<br /> I didn’t mean to hurt you.<br /> You mean a lot to me.<br /><br /> Please unblock me and call me whenever you get time. </p>
    </div>
  </body>
</html>
